<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PigeonGuard</title>
  <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
  <div class="popup">

    <div id="mainView">
      <div id="themeToggle" class="top-row">
        <img id="themeIcon" src="/icons/moon.png" class="top-icon" alt="Dark mode">
      </div>

      <div class="brand-row">

        <div class="logo-box">
          <img src="/icons/pigeon_outline.png" alt="Logo">
        </div>
        <h1>PigeonGuard</h1>

      </div>

      <div id="statusIcon" class="status-icon safe">
        <img id="statusImg" src="/icons/safety128x128.png" alt="status">
      </div>

      <p id="statusText">Current page is secure</p>

      <div class="buttons">

        <button id="openReport" class="report">Blacklist website</button>
        <button id="openWhitelist" class="whitelist">Whitelist website</button>

      </div>
    </div>

    <div id="whitelistView" class="hidden">

      <div class="brand-row whitelist-brand">

        <div class="logo-box">
          <img src="/icons/pigeon_outline.png" alt="Logo">
        </div>
        <h1>PigeonGuard</h1>

      </div>

      <div class="url-row">

        <input id="whitelistInput" type="text" placeholder="Enter URL">
        <button id="addWhitelist" class="plus-btn">+</button>

      </div>

      <h2>Whitelist</h2>

      <div id="whitelistBox"></div>

      <button id="backButton" class="back-btn">Back</button>

    </div>

    <div id="reportView" class="hidden">

      <div class="brand-row whitelist-brand">

        <div class="logo-box">
          <img src="/icons/pigeon_outline.png" alt="Logo">
        </div>

        <h1>PigeonGuard</h1>

      </div>

      <div class="url-row">

        <input id="blacklistInput" type="text" placeholder="Enter URL">
        <button id="addBlacklist" class="plus-btn">+</button>

      </div>

      <h2>Blacklist</h2>

      <div id="blacklistBox"></div>

      <button id="reportBackButton" class="back-btn">Back</button>

    </div>

  </div>

  <script src="/popup.js"></script>
</body>
</html>
